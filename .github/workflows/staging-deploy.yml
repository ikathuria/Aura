name: Staging Deploy

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check Function Auth
        run: npm run check:function-auth

      - name: Build
        run: npm run build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply Database Migrations (Staging)
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Edge Functions (Staging)
        run: |
          supabase functions deploy assign-persona
          supabase functions deploy prefetch-persona-assets
          supabase functions deploy generate-story-script
          supabase functions deploy reset-assets

      - name: Pull Vercel Environment
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Frontend Artifact
        run: npx vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy Frontend (Staging Project)
        run: npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
